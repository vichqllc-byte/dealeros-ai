services:
  test-db:
    image: postgres:16
    container_name: dealeros-test-db
    environment:
      POSTGRES_DB: dealeros_test
      POSTGRES_USER: dealeros_test
      POSTGRES_PASSWORD: dealeros_test_pw
    ports:
      - '54329:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dealeros_test -d dealeros_test']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s
