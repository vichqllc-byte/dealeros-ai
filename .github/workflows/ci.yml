name: DealersOS Phase 1 CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: dealeros_test
          POSTGRES_USER: dealeros_test
          POSTGRES_PASSWORD: dealeros_test_pw
        ports:
          - 54329:5432
        options: >-
          --health-cmd="pg_isready -U dealeros_test -d dealeros_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: postgresql://dealeros_test:dealeros_test_pw@localhost:54329/dealeros_test
      DIRECT_URL: postgresql://dealeros_test:dealeros_test_pw@localhost:54329/dealeros_test
      SUPABASE_URL: https://test-project.supabase.co
      SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsx prisma/test-seed/seed.ts
      - run: npm run test:routes
      - run: npm run test
